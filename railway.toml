[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'if [ \"$IS_WORKER\" = \"true\" ]; then node src/workers/paymentWorker.js; else node src/database/migrate.js && node src/server.js; fi'"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
