version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: payflow-postgres
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payflow -d payflow']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payflow-net

  redis:
    image: redis:7-alpine
    container_name: payflow-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payflow-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: payflow-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - payflow-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payflow-api
    command: node src/server.js
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payflow-net
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payflow-worker
    command: node src/workers/paymentWorker.js
    env_file: .env
    environment:
      NODE_ENV: production
      SERVICE_NAME: payflow-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - payflow-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  payflow-net:
    driver: bridge
